    <!-- Fonts — non-blocking load.
         The Google Fonts stylesheet is normally render-blocking (the browser
         pauses first paint until it comes back). We avoid that with the
         "print-onload" pattern: request it as media="print" so the browser
         deprioritises it, then swap to media="all" once it has loaded. The
         <noscript> fallback keeps the site readable for the rare JS-off
         visitor (and well-behaved crawlers that don't run JS but do honour
         <link rel="stylesheet">). `display=swap` is already in the URL so
         text renders immediately in the system fallback, then re-renders in
         Inter / Archivo Black when the webfont arrives. -->
    <!-- Preload the homepage hero background. This is a client-rendered SPA
         (no SSR), so the browser's preload scanner can't discover this image
         from markup until React mounts and renders HeroHome — without this
         hint it only starts downloading after the full JS bundle parses and
         executes, which is the dominant LCP delay on /. Only the homepage
         benefits; interior pages use a different hero image per route. -->
    <link rel="preload" as="image" href="/images/gym/floor-hero.webp" fetchpriority="high" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicons & home-screen icons — real Bossie's logo crest.
         • favicon.png (64) for browser tabs.
         • favicon.svg as a sharper fallback where supported.

         • logo-mark.png (192) and icon-512.png (512) are referenced from
           site.webmanifest so Android also picks the crest as the home-screen icon. -->
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png?v=2" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
